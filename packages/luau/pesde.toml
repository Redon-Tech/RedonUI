name = "redon_tech/redon_ui"
version = "0.1.0"
description = "RedonUI Fusion v0.3 component library for Roblox"
license = "MIT"
authors = ["parker02311"]
repository = "https://github.com/Redon-Tech/RedonUI"

[target]
environment = "roblox"
lib = "src/init.luau"

[indices]
default = "https://github.com/pesde-pkg/index"

[wally_indices]
default = "https://github.com/UpliftGames/wally-index"

[dependencies]
Fusion = { wally = "plainsour/lemon", version = "=0.4.0-dev.1.3", index = "default" }
